<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SatMouse — Reference Client</title>
  <link rel="stylesheet" href="style.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
    }
  }
  </script>
</head>
<body>
  <header id="status-bar">
    <satmouse-status></satmouse-status>
  </header>
  <main>
    <section id="viewport">
      <canvas id="canvas"></canvas>
    </section>
    <aside id="sidebar">
      <h2>Debug</h2>
      <satmouse-debug></satmouse-debug>

      <h2>Controls</h2>
      <div class="controls">
        <button id="btn-reset">Reset</button>
        <div class="toggle-row">
          <button id="btn-lock-pos" class="toggle">Lock Position</button>
          <button id="btn-lock-rot" class="toggle">Lock Rotation</button>
        </div>
        <div class="toggle-row">
          <button id="btn-lock-orbit" class="toggle">Lock Orbit</button>
          <button id="btn-dominant" class="toggle">Dominant</button>
        </div>
      </div>

      <h2>Devices</h2>
      <satmouse-devices></satmouse-devices>

      <h3>Button Log</h3>
      <div id="button-log"></div>
    </aside>
  </main>
  <script type="module" src="main.js"></script>
</body>
</html>
