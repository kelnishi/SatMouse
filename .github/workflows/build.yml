name: Build

on:
  push:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: macos-13
            platform: darwin
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: windows-latest
            platform: win32
            arch: x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Bundle
        run: npm run build

      - name: Build SEA
        run: |
          node --experimental-sea-config sea-config.json

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: satmouse-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/
