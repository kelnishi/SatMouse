name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: arm64
            ext: ""
          - os: ubuntu-latest
            platform: linux
            arch: x64
            ext: ""
          - os: windows-latest
            platform: win32
            arch: x64
            ext: ".exe"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Bundle
        run: npm run build

      - name: Build SEA blob
        run: node --experimental-sea-config sea-config.json

      - name: Create SEA binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp "$(command -v node)" "dist/satmouse${{ matrix.ext }}"
          if [[ "${{ matrix.platform }}" == "darwin" ]]; then
            codesign --remove-signature "dist/satmouse" || true
          fi
          npx postject "dist/satmouse${{ matrix.ext }}" NODE_SEA_BLOB dist/satmouse.blob \
            --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2

      - name: Create SEA binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item (Get-Command node).Source "dist/satmouse.exe"
          npx postject "dist/satmouse.exe" NODE_SEA_BLOB dist/satmouse.blob `
            --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2

      - name: Code sign (macOS)
        if: matrix.platform == 'darwin'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "$APPLE_CERTIFICATE" | base64 --decode > cert.p12
            KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
            security create-keychain -p "" "$KEYCHAIN_PATH"
            security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
            security unlock-keychain -p "" "$KEYCHAIN_PATH"
            security import cert.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
            security list-keychain -d user -s "$KEYCHAIN_PATH"
            codesign --sign "Developer ID Application" --options runtime dist/satmouse
            rm cert.p12
          else
            codesign --sign - dist/satmouse
          fi

      - name: Package
        run: |
          cd dist
          tar czf ../satmouse-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz satmouse${{ matrix.ext }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: satmouse-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz
