name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: arm64
            ext: ""
          - os: ubuntu-latest
            platform: linux
            arch: x64
            ext: ""
          - os: windows-latest
            platform: win32
            arch: x64
            ext: ".exe"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Bundle
        run: npm run build

      - name: Build SEA blob
        run: node --experimental-sea-config sea-config.json

      - name: Create SEA binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp "$(command -v node)" "dist/satmouse${{ matrix.ext }}"
          chmod u+w "dist/satmouse${{ matrix.ext }}"
          if [[ "${{ matrix.platform }}" == "darwin" ]]; then
            codesign --remove-signature "dist/satmouse" || true
            npx postject "dist/satmouse" NODE_SEA_BLOB dist/satmouse.blob \
              --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2 \
              --macho-segment-name NODE_SEA
          else
            npx postject "dist/satmouse" NODE_SEA_BLOB dist/satmouse.blob \
              --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2
          fi

      - name: Create SEA binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item (Get-Command node).Source "dist/satmouse.exe"
          npx postject "dist/satmouse.exe" NODE_SEA_BLOB dist/satmouse.blob `
            --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2

      - name: Package macOS .app
        if: matrix.platform == 'darwin'
        env:
          SATMOUSE_VERSION: ${{ github.ref_name }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          bash scripts/package-macos-app.sh dist/satmouse

          if [ -n "${APPLE_CERTIFICATE:-}" ]; then
            # Import certificate into a temporary keychain
            KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
            KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
            security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            echo "$APPLE_CERTIFICATE" | base64 --decode > cert.p12
            security import cert.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
            security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security list-keychain -d user -s "$KEYCHAIN_PATH"
            rm cert.p12

            # Sign with hardened runtime + entitlements
            codesign --sign "Developer ID Application: ${APPLE_TEAM_ID}" \
              --options runtime \
              --entitlements scripts/entitlements.plist \
              --force --deep --timestamp \
              dist/SatMouse.app

            cd dist && zip -r ../SatMouse-macOS-${{ matrix.arch }}.zip SatMouse.app && cd ..

            # Notarize with Apple
            if [ -n "${APPLE_ID:-}" ]; then
              xcrun notarytool submit SatMouse-macOS-${{ matrix.arch }}.zip \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_APP_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" \
                --wait --timeout 10m

              # Staple the notarization ticket
              xcrun stapler staple dist/SatMouse.app

              # Re-zip with stapled ticket
              rm -f SatMouse-macOS-${{ matrix.arch }}.zip
              cd dist && zip -r ../SatMouse-macOS-${{ matrix.arch }}.zip SatMouse.app
            fi

            security delete-keychain "$KEYCHAIN_PATH"
          else
            codesign --sign - --deep dist/SatMouse.app
            cd dist && zip -r ../SatMouse-macOS-${{ matrix.arch }}.zip SatMouse.app
          fi

      - name: Package Linux
        if: matrix.platform == 'linux'
        run: |
          cd dist
          tar czf ../satmouse-linux-${{ matrix.arch }}.tar.gz satmouse

      - name: Package Windows
        if: matrix.platform == 'win32'
        run: |
          cd dist
          tar czf ../satmouse-win32-${{ matrix.arch }}.tar.gz satmouse.exe

      - name: Upload release asset (macOS)
        if: matrix.platform == 'darwin'
        uses: softprops/action-gh-release@v2
        with:
          files: SatMouse-macOS-${{ matrix.arch }}.zip

      - name: Upload release asset (Linux/Windows)
        if: matrix.platform != 'darwin'
        uses: softprops/action-gh-release@v2
        with:
          files: satmouse-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz
