name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: windows-latest
            platform: win32
            arch: x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Bundle
        run: |
          npm run build
          npm run build:tray
          npm run build:client

      - name: Package macOS .app
        if: matrix.platform == 'darwin'
        env:
          SATMOUSE_VERSION: ${{ github.ref_name }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          # Package .app with the Node binary (not SEA)
          bash scripts/package-macos-app.sh "$(command -v node)"

          if [ -n "${APPLE_CERTIFICATE:-}" ]; then
            KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
            KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
            security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            echo "$APPLE_CERTIFICATE" | base64 --decode > cert.p12
            security import cert.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
              -k "$KEYCHAIN_PATH" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple: \
              -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" || true
            security list-keychain -d user -s "$KEYCHAIN_PATH"
            rm cert.p12

            SIGNING_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | head -1 | sed 's/.*"\(.*\)"/\1/')
            echo "Signing with: $SIGNING_IDENTITY"

            # Sign only Mach-O binaries (skip non-darwin .node files and non-binary files named "node")
            find dist/SatMouse.app -type f \( -name "*.node" -o -name "*.dylib" \) | while read f; do
              if file "$f" | grep -q "Mach-O"; then
                echo "Signing: $f"
                codesign --sign "$SIGNING_IDENTITY" --options runtime --timestamp --force "$f"
              fi
            done
            # Sign the Node binary with entitlements (needs JIT + unsigned memory)
            echo "Signing: dist/SatMouse.app/Contents/Resources/bin/node"
            codesign --sign "$SIGNING_IDENTITY" --options runtime \
              --entitlements scripts/entitlements.plist \
              --timestamp --force \
              dist/SatMouse.app/Contents/Resources/bin/node

            # Sign the .app bundle
            codesign --sign "$SIGNING_IDENTITY" \
              --options runtime \
              --entitlements scripts/entitlements.plist \
              --force --deep --timestamp \
              dist/SatMouse.app

            cd dist && zip -r ../SatMouse-macOS-${{ matrix.arch }}.zip SatMouse.app && cd ..

            # Notarize
            if [ -n "${APPLE_ID:-}" ]; then
              xcrun notarytool submit SatMouse-macOS-${{ matrix.arch }}.zip \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_APP_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" \
                --wait --timeout 10m

              xcrun stapler staple dist/SatMouse.app
              rm -f SatMouse-macOS-${{ matrix.arch }}.zip
              cd dist && zip -r ../SatMouse-macOS-${{ matrix.arch }}.zip SatMouse.app
            fi

            security delete-keychain "$KEYCHAIN_PATH"
          else
            codesign --sign - --deep dist/SatMouse.app
            cd dist && zip -r ../SatMouse-macOS-${{ matrix.arch }}.zip SatMouse.app
          fi

      - name: Package Linux
        if: matrix.platform == 'linux'
        run: |
          cp "$(command -v node)" dist/node
          cp dist/main.js dist/main.cjs
          cp assets/icons/SatMouse.svg dist/SatMouse.svg
          cp src/devices/plugins/hid/profiles.json dist/profiles.json
          cd dist
          tar czf ../satmouse-linux-${{ matrix.arch }}.tar.gz node main.cjs SatMouse.svg profiles.json

      - name: Package Windows
        if: matrix.platform == 'win32'
        run: |
          Copy-Item (Get-Command node).Source "dist/node.exe"
          Copy-Item "dist/main.js" "dist/main.cjs"
          Copy-Item "assets/icons/SatMouse-Default-1024x1024@1x.png" "dist/SatMouse.png"
          Copy-Item "src/devices/plugins/hid/profiles.json" "dist/profiles.json"
          cd dist
          tar czf ../satmouse-win32-${{ matrix.arch }}.tar.gz node.exe main.cjs SatMouse.png profiles.json
        shell: pwsh

      - name: Upload release asset (macOS)
        if: matrix.platform == 'darwin'
        uses: softprops/action-gh-release@v2
        with:
          files: SatMouse-macOS-${{ matrix.arch }}.zip

      - name: Upload release asset (Linux/Windows)
        if: matrix.platform != 'darwin'
        uses: softprops/action-gh-release@v2
        with:
          files: satmouse-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz
